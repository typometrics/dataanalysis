<h1>Guajajára — Bastard Examples</h1>
<div class="info"><p>Bastard dependencies (non-projective or cross-clausal links) are highlighted in <b>orange</b> below.</p></div>
<div class="example">
<div class="example-meta">Bastard Example 1</div>
<reactive-dep-tree interactive="true" shown-features="UPOS,LEMMA,FORM,MISC.span,MISC.highlight" conll="#  Example 1
#  S V PP
# sent_id = 18
# text = Awakwer oho kope wa
# text_eng = All men went to the field
# text_port = Os homens foram para a roça (Harrison, 2013:16)
# text_spa = Los hombres fueron al campo
1	Awakwer	awa	NOUN	n	Number=Coll	2	obl:subj	_	_
2	oho	ho	VERB	vi	_	0	root	_	Person[subj]=3
3	kope	ko	NOUN	n	Case=Loc	2	obl	_	_
4	wa	wa	PART	pcl	Number=Plur	1	discourse	_	highlight=orange
"></reactive-dep-tree>
</div>
<div class="example">

# text = Mon aipo ur iko aʔe
# text_eng = Who is coming?
# text_port = Quem está vindo? (Harrison, 2013:111)

1	Mon	mon	PRON	pro	PronType=Int	3	obl:subj	_	_
2	aipo	aipo	PART	pcl	_	1	discourse	_	Int=Yes
3	ur	ur	VERB	vi	_	0	root	_	Person[subj]=3
4	iko	iko	AUX	aux	Aspect=Prog	3	aux	_	Person[subj]=3
5	aʔe	aʔe	PRON	pro	PronType=Dem	1	discourse	_	highlight=orange
"></reactive-dep-tree>
</div>
