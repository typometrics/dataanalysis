<h1>Neapolitan — Bastard Examples</h1>
<div class="info"><p>Bastard dependencies (non-projective or cross-clausal links) are highlighted in <b>orange</b> below.</p></div>
<div class="example">
<div class="example-meta">Bastard Example 1</div>
<reactive-dep-tree interactive="true" shown-features="UPOS,LEMMA,FORM,MISC.span,MISC.highlight" conll="#  Example 1
# parallel_id = cairo/14
# sent_id = cairo14
# text = Quannŏ pienzĕ 'e vĕnì?
# text_en = When do you think you can come?
1	Quannŏ	quannŏ	ADV	_	PronType=Int	4	advmod	_	highlight=orange
2	pienzĕ	penzà	VERB	_	Mood=Ind|Person=2|Tense=Pres|VerbForm=Fin	0	root	_	_
3	'e	'e	ADP	_	_	4	mark	_	_
4	vĕnì	venì	VERB	_	VerbForm=Inf	2	xcomp	_	SpaceAfter=No
5	?	?	PUNCT	_	_	2	punct	_	_
"></reactive-dep-tree>
</div>
