<h1>SpanishSign — Bastard Examples</h1>
<div class="info"><p>Bastard dependencies (non-projective or cross-clausal links) are highlighted in <b>orange</b> below.</p></div>
<div class="example">
<div class="example-meta">Bastard Example 1</div>
<reactive-dep-tree interactive="true" shown-features="UPOS,LEMMA,FORM,MISC.span,MISC.highlight" conll="#  Example 1
# gloss_en = cl BIKE MAN BIKE BIKE
# sent_id = PS-JRV#028
# text = cl.e(Xa):BICICLETA-aproximarse BICICLETA HOMBRE BICICLETA BICICLETA
# text_en = The child on the bike approached  pedalling at a good pace.
# text_es = El niño de la bici se iba acercando pedaleando a buen ritmo.
1	cl.e(Xa):BICICLETA-aproximarse	_	VERB	V.D	_	0	root	_	Gloss=cl
2	BICICLETA	_	VERB	V	_	1	compound:svc	_	Gloss=BIKE
3	HOMBRE	_	NOUN	N	_	1	nsubj	_	Gloss=MAN
4	BICICLETA	_	VERB	V	_	2	compound:vsc	_	Gloss=BIKE|highlight=orange
5	BICICLETA	_	VERB	V	_	4	compound:redup	_	Gloss=BIKE
"></reactive-dep-tree>
</div>
<div class="example">
<div class="example-meta">Bastard Example 2</div>
<reactive-dep-tree interactive="true" shown-features="UPOS,LEMMA,FORM,MISC.span,MISC.highlight" conll="#  Example 2
# gloss_en = INDX.PRO:1sg INDX.PRO:3pl INDX.PRO:1sg SAY NOTHING
# sent_id = VV-FRE#047
# text = INDX.PRO:1sg INDX.PRO:3pl INDX.PRO:1sg DECIR NADA
# text_en = I didn't tell them anything ?
# text_es = No les dije nada ?
1	INDX.PRO:1sg	_	PRON	Pro	_	4	nsubj	_	Gloss=INDX.PRO:1sg
2	INDX.PRO:3pl	_	PRON	Pro	_	4	iobj	_	Gloss=INDX.PRO:3pl
3	INDX.PRO:1sg	_	PRON	Pro	_	1	compound:redup	_	Gloss=INDX.PRO:1sg|highlight=orange
4	DECIR	_	VERB	V.Dir	_	0	root	_	Gloss=SAY
5	NADA	_	NOUN	N	_	4	obj	_	Gloss=NOTHING
"></reactive-dep-tree>
</div>
<div class="example">
<div class="example-meta">Bastard Example 3</div>
<reactive-dep-tree interactive="true" shown-features="UPOS,LEMMA,FORM,MISC.span,MISC.highlight" conll="#  Example 3
# gloss_en = INDX.PRO:1sg PERSON MAN INDX.PRO:1sg HELP
# sent_id = VV-FRE#060
# text = INDX.PRO:1sg PERSONA HOMBRE INDX.PRO:1sg AYUDAR
# text_en = I help the men
# text_es = Yo ayudo a los hombres
1	INDX.PRO:1sg	_	PRON	Pro	_	5	nsubj	_	Gloss=INDX.PRO:1sg
2	PERSONA	_	NOUN	N.Loc	_	5	obj	_	Gloss=PERSON
3	HOMBRE	_	NOUN	N.P	_	2	appos	_	Gloss=MAN
4	INDX.PRO:1sg	_	PRON	Pro	_	1	compound:redup	_	Gloss=INDX.PRO:1sg|highlight=orange
5	AYUDAR	_	VERB	V.Dir	_	0	root	_	Gloss=HELP
"></reactive-dep-tree>
</div>
