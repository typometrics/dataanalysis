<h1>Moksha — Bastard Examples</h1>
<div class="info"><p>Bastard dependencies (non-projective or cross-clausal links) are highlighted in <b>orange</b> below.</p></div>
<div class="example">
<div class="example-meta">Bastard Example 1</div>
<reactive-dep-tree interactive="true" shown-features="UPOS,LEMMA,FORM,MISC.span,MISC.highlight" conll="#  Example 1

# text = Сексе пяли цёрокшсь кармась срхкама школав.

2	пяли	пяли	NOUN	N	Case=Lat|Definite=Ind|Number=Plur,Sing	5	obl	_	GTtags=SP,Lat,Indef|highlight=orange

4	кармась	кармамс	VERB	V	Mood=Ind|Tense=Past|VerbForm=Fin	0	root	_	GTtags=Ind,Prt1,ScSg3|Number[subj]=Sing|Person[subj]=3
5	срхкама	срхкамс	VERB	V	Case=Loc|VerbForm=Inf	4	xcomp	_	GTtags=Inf,Loc
6	школав	школа	NOUN	N	Case=Lat|Definite=Ind|Number=Plur,Sing	5	obl	_	GTtags=SP,Lat,Indef|SpaceAfter=No
7	.	.	PUNCT	PUNCT	_	4	punct	_	_
"></reactive-dep-tree>
</div>
