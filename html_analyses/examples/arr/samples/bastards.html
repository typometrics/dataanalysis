<h1>Karo — Bastard Examples</h1>
<div class="info"><p>Bastard dependencies (non-projective or cross-clausal links) are highlighted in <b>orange</b> below.</p></div>
<div class="example">
<div class="example-meta">Bastard Example 1</div>
<reactive-dep-tree interactive="true" shown-features="UPOS,LEMMA,FORM,MISC.span,MISC.highlight" conll="#  Example 1
# sent_id = 270
# text = õn wat kaʔa ʔa kət cagáro kõmnem
# text_eng = I have two houses. (lit. My two houses walk.) (Gabas 1999, 108)
1	õn	õn	PRON	pron	Number=Sing|Person=1|PronType=Prs	5	nsubj	_	_
2	wat	wat	PRON	pron	Number=Sing|Person=1|PronType=Prs	3	nmod	_	_
3	kaʔa	kaʔa	NOUN	n	_	5	obj	_	_
4	ʔa	ʔa	ADJ	adj	_	3	clf	_	Clas=Rd
5	kət	kə	VERB	v	_	0	root	_	Decl=Assert
6	cagáro	cagáro	NUM	num	_	3	nummod	_	highlight=orange
7	kõmnem	kõm	X	x	_	5	dep	_	_
"></reactive-dep-tree>
</div>
