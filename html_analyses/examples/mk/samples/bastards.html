<h1>Macedonian — Bastard Examples</h1>
<div class="info"><p>Bastard dependencies (non-projective or cross-clausal links) are highlighted in <b>orange</b> below.</p></div>
<div class="example">
<div class="example-meta">Bastard Example 1</div>
<reactive-dep-tree interactive="true" shown-features="UPOS,LEMMA,FORM,MISC.span,MISC.highlight" conll="#  Example 1
# newpar id = cairo14
# parallel_id = cairo/14
# sent_id = cairo14
# text = Кога мислиш дека можеш да дојдеш?
# text_en = When do you think you can come?
# translit = Koga misliš deka možeš da dojdeš?
1	Кога	кога	ADV	_	PronType=Int	6	advmod	_	LTranslit=koga|Translit=Koga|highlight=orange
2	мислиш	мисли	VERB	_	Aspect=Imp|Mood=Ind|Number=Sing|Person=2|Tense=Pres|VerbForm=Fin|Voice=Act	0	root	_	LTranslit=misli|Translit=misliš
3	дека	дека	SCONJ	_	_	4	mark	_	LTranslit=deka|Translit=deka
4	можеш	може	VERB	_	Aspect=Imp|Mood=Ind|Number=Sing|Person=2|Tense=Pres|VerbForm=Fin|Voice=Act	2	ccomp	_	LTranslit=može|Translit=možeš
5	да	да	PART	_	_	6	mark	_	LTranslit=da|Translit=da
6	дојдеш	дојде	VERB	_	Aspect=Perf|Mood=Ind|Number=Sing|Person=2|Tense=Pres|VerbForm=Fin|Voice=Act	4	xcomp	_	LTranslit=dojde|SpaceAfter=No|Translit=dojdeš
7	?	?	PUNCT	_	_	2	punct	_	LTranslit=?|Translit=?
"></reactive-dep-tree>
</div>
<div class="example">
<div class="example-meta">Bastard Example 2</div>
<reactive-dep-tree interactive="true" shown-features="UPOS,LEMMA,FORM,MISC.span,MISC.highlight" conll="#  Example 2
# sent_id = other0131
# text = Ќе дојдам тогаш кога ќе речете.
# translit = Ťe dojdam togaš koga ťe rečete.
1	Ќе	ќе	AUX	_	_	2	aux	_	LTranslit=ťe|Translit=Ťe
2	дојдам	дојде	VERB	_	Aspect=Perf|Mood=Ind|Number=Sing|Person=1|Tense=Pres|VerbForm=Fin|Voice=Act	0	root	_	LTranslit=dojde|Translit=dojdam
3	тогаш	тогаш	ADV	_	PronType=Dem	2	advmod	_	LTranslit=togaš|Translit=togaš
4	кога	кога	ADV	_	PronType=Int	6	advmod	_	LTranslit=koga|Translit=koga|highlight=orange
5	ќе	ќе	AUX	_	_	2	aux	_	LTranslit=ťe|Translit=ťe
6	речете	рече	VERB	_	Aspect=Perf|Mood=Ind|Number=Plur|Person=2|Tense=Pres|VerbForm=Fin|Voice=Act	2	ccomp	_	LTranslit=reče|SpaceAfter=No|Translit=rečete
7	.	.	PUNCT	_	_	2	punct	_	LTranslit=.|Translit=.
"></reactive-dep-tree>
</div>
