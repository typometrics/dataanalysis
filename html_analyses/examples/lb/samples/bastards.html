<h1>Luxembourgish — Bastard Examples</h1>
<div class="info"><p>Bastard dependencies (non-projective or cross-clausal links) are highlighted in <b>orange</b> below.</p></div>
<div class="example">
<div class="example-meta">Bastard Example 1</div>
<reactive-dep-tree interactive="true" shown-features="UPOS,LEMMA,FORM,MISC.span,MISC.highlight" conll="#  Example 1
# parallel_id = cairo/9
# sent_id = test-c9
# text = D'Mary huet Bronze gewonnen, de Peter Sëlwer an d'Jane Gold.
1	D'	d'	DET	D	_	2	det	_	SpaceAfter=No|def=def
2	Mary	Mary	NOUN	N	_	5	nsubj	_	_
3	huet	hunn	AUX	V	_	5	aux	_	_
4	Bronze	Bronze	NOUN	N	_	5	obj	_	_
5	gewonnen	gewannen	VERB	V	_	0	root	_	SpaceAfter=No|n-fin=n-fin
6	,	,	PUNCT	$	_	5	punct	_	_
7	de	den	DET	D	_	8	det	_	_
8	Peter	Peter	NOUN	N	_	5	conj	_	_
9	Sëlwer	Sëlwer	NOUN	N	_	8	orphan	_	_
10	an	an	CCONJ	Konj	_	5	cc	_	_
11	d'	d'	DET	D	_	12	det	_	SpaceAfter=No|def=def
12	Jane	Jane	NOUN	N	_	8	conj	_	highlight=orange
13	Gold	Gold	NOUN	N	_	12	orphan	_	SpaceAfter=No
14	.	.	PUNCT	$	_	5	punct	_	_
"></reactive-dep-tree>
</div>
