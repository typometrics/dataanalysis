<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bastard Example - Dependency Tree</title>
  <script src="https://unpkg.com/reactive-dep-tree/dist/reactive-dep-tree.umd.js" async deferred></script>
  <style>
    :root { color-scheme: light; }
    html, body { background: #fff; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; }
    .tree-container {
      display: inline-block;
      padding: 30px 40px 20px 40px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="tree-container" id="tree">
    <reactive-dep-tree
      interactive="false"
      shown-features="FORM"
      conll="# text = 'Vogel' comes from German which means bird
1	'Vogel'	Vogel	PROPN	PROPN	_	2	nsubj	_	highlight=green
2	comes	come	VERB	VERB	_	0	root	_	highlight=red
3	from	from	ADP	ADP	_	4	case	_	_
4	German	German	PROPN	PROPN	_	2	obl	_	highlight=green
5	which	which	PRON	PRON	_	6	nsubj	_	_
6	means	mean	VERB	VERB	_	1	acl:relcl	_	_
7	bird	bird	NOUN	NOUN	_	6	obj	_	_"
    ></reactive-dep-tree>
  </div>
</body>
</html>
